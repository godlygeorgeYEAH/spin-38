<ion-content [fullscreen]="true" class="home-background"
             [class.performance-low]="getPerformanceTier() === 'low'"
             [class.performance-medium]="getPerformanceTier() === 'medium'"
             [class.performance-high]="getPerformanceTier() === 'high'">

  <video class="background-video" autoplay loop muted playsinline preload="auto" webkit-playsinline>
    <source src="assets/videos/fondo-azul.mp4" type="video/mp4">
    <source src="assets/videos/fondo-azul.webm" type="video/webm">
  </video>

  <div class="game-area">
    <div class="wheel-side">
      <div class="round-state-display">
        <span *ngIf="(orchestrator.roundState$ | async) === 'COUNTING_DOWN'">
          {{ orchestrator.secondsToNextRound$ | async }}s
        </span>
        <span *ngIf="(orchestrator.roundState$ | async) === 'SPINNING'">Girando...</span>
        <span *ngIf="(orchestrator.roundState$ | async) === 'REVEALING'">Resultado</span>
      </div>
      <div class="wheel-container-wrapper">
        <app-wheel-container
          [gameState]="gameState"
          [spinDuration]="spinDuration"
          [innerWheelSpinDuration]="innerWheelSpinDuration">
        </app-wheel-container>
      </div>
    </div>
  </div>

</ion-content>
