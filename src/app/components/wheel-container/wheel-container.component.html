<div class="wheel-wrapper"
     [class.performance-low]="performanceProfile.tier === 'low'"
     [class.performance-medium]="performanceProfile.tier === 'medium'"
     [class.performance-high]="performanceProfile.tier === 'high'">
  <div class="water-ring-anchor">
    <app-water-ring
      [size]="waterRingSize"
      [style.position]="'relative'"
      [style.left.px]="-(waterRingSize / 2)"
      [style.top.px]="-(waterRingSize / 2)"
    ></app-water-ring>
  </div>
  <div class="pointers-container"
       [style.--pointer-container-width]="pointerContainerWidth"
       [style.--pointer-container-height]="pointerContainerHeight">
    <img src="assets/images/rueda/puntero1.png" alt="Puntero" class="pointer-image" [class.bounce]="pointerBounce">
  </div>
  <svg class="wheel" [attr.viewBox]="viewBoxSize">
    <defs>
      <radialGradient *ngFor="let g of outerWheelColors; let i = index"
          [attr.id]="'outerGradient-' + i + '-' + componentId" cx="50%" cy="50%" r="50%">
        <stop [attr.offset]="g.stops[0].offset" [attr.stop-color]="g.stops[0].color" />
        <stop [attr.offset]="g.stops[1].offset" [attr.stop-color]="g.stops[1].color" />
      </radialGradient>
      <radialGradient [attr.id]="'selectedGradient-' + componentId" cx="50%" cy="50%" r="50%">
        <stop [attr.offset]="selectedSegmentColor.stops[0].offset" [attr.stop-color]="selectedSegmentColor.stops[0].color" />
        <stop [attr.offset]="selectedSegmentColor.stops[1].offset" [attr.stop-color]="selectedSegmentColor.stops[1].color" />
      </radialGradient>
      <radialGradient *ngFor="let g of innerWheelColors; let i = index"
          [attr.id]="'innerGradient-' + i + '-' + componentId" cx="50%" cy="50%" r="50%">
        <stop [attr.offset]="g.stops[0].offset" [attr.stop-color]="g.stops[0].color" />
        <stop [attr.offset]="g.stops[1].offset" [attr.stop-color]="g.stops[1].color" />
      </radialGradient>
    </defs>
    <g #outerWheel>
      <g *ngFor="let item of displayItems; let i = index">
        <path [attr.d]="getSegmentPath(outerRingRadius, i)"
          [attr.fill]="'url(#outerGradient-' + (i % 2) + '-' + componentId + ')'"
          stroke="#d4af37" stroke-width="2" />
      </g>
      <g *ngFor="let item of displayItems; let i = index" [attr.transform]="getAnimalTransform(i)">
        <image *ngIf="item.image"
               [attr.href]="item.image"
               [attr.x]="animalImageOffset" [attr.y]="animalImageOffset"
               [attr.width]="animalImageSize" [attr.height]="animalImageSize"
               (error)="onImageError($event, item)" />
        <text *ngIf="!item.image" x="0" y="0" class="roulette-animal-outer" [attr.font-size]="outerAnimalFontSize">{{ item.emoji || item.position }}</text>
      </g>
    </g>
    <g #innerWheel>
      <g *ngFor="let item of innerDisplayItems; let i = index">
        <path [attr.d]="getSegmentPath(innerRingRadius, i)"
          [attr.fill]="'url(#innerGradient-' + (i % 2) + '-' + componentId + ')'"
          stroke="#d4af37" stroke-width="2" />
      </g>
      <g *ngFor="let item of innerDisplayItems; let i = index" [attr.transform]="getInnerAnimalTransform(i)">
        <image *ngIf="item.image"
               [attr.href]="item.image"
               [attr.x]="animalImageOffset" [attr.y]="animalImageOffset"
               [attr.width]="animalImageSize" [attr.height]="animalImageSize"
               (error)="onImageError($event, item)" />
        <text *ngIf="!item.image" x="0" y="0" class="roulette-animal-inner" [attr.font-size]="innerAnimalFontSize">{{ item.emoji || item.position }}</text>
      </g>
    </g>
  </svg>

  <!-- Borde decorativo de la rueda -->
  <div class="wheel-border">
    <img src="assets/images/rueda/bordedeagua.png" alt="Borde" class="wheel-border-image">
  </div>

  <!-- Confetti Animation - Explosión circular desde el centro (adaptativo) -->
  <div class="confetti-container" *ngIf="showConfetti">
    <div class="confetti" *ngFor="let particle of confettiArray"
         [style.--angle]="particle.angle + 'deg'"
         [style.--distance]="particle.distance + 'px'"
         [style.animation-delay]="particle.delay + 's'"
         [style.animation-duration]="particle.duration + 's'"
         [style.background]="getConfettiColor(particle.index)"></div>
  </div>
</div>
