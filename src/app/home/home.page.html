             [class.performance-low]="getPerformanceTier() === 'low'"
             [class.performance-medium]="getPerformanceTier() === 'medium'"
             [class.performance-high]="getPerformanceTier() === 'high'">

  <!-- Video de fondo para móviles (con fallback MP4 para Safari) 
  <video #backgroundVideo class="background-video" autoplay loop muted playsinline preload="auto" webkit-playsinline>
    <source src="assets/videos/fondo-azul.mp4" type="video/mp4">

  </video> -->

  <!-- Logo superior izquierdo -->
  <div class="logo-container">
    <img src="assets/images/logo/logo1.png" alt="Logo" class="game-logo">
  </div>

  <!-- Header - Contiene botones de ayuda 
  <div class="header">
     Clear All Button - Esquina superior izquierda 
    <div class="clear-all-button-container" *ngIf="selectedAnimals.length > 0">
      <button (click)="clearAllBets()" class="clear-all-button" title="Limpiar Todo">
      </button>
    </div> -->

    <!-- Help Buttons - Esquina superior derecha 
    <div class="help-button-container">
      <button (click)="openBetHistory()" class="help-button history-btn" title="Historial de Apuestas">
        <span style="font-size: 24px; color: var(--gold-primary);">📊</span>
      </button>
      <button (click)="openSettings()" class="help-button settings-btn" title="Configuración de Audio">
        <ion-icon name="settings-outline" style="font-size: 24px; color: var(--gold-primary);"></ion-icon>
      </button>
    </div>
  </div> -->


  <!-- Reloj de esquina inferior izquierda -->
  <div class="clock-widget" aria-label="Hora: ">
    <canvas #owlCanvas class="buho-gif"></canvas>
    <img class="buho-gif" [src]="owlGifSrc" [style.opacity]="owlAnimating ? '1' : '0'" alt="" aria-hidden="true">
    <div class="clock-time-value" *ngIf="(orchestrator.roundState$ | async) !== 'COUNTING_DOWN'">
      {{ clockTime }}
    </div>
    <app-countdown-timer *ngIf="(orchestrator.roundState$ | async) === 'COUNTING_DOWN'" (anticipation)="onAnticipation()"></app-countdown-timer>
  </div>

  <!-- Betting Panel - Contenedor independiente y responsive -->
  <div class="betting-panel"
       *ngIf="isBettingControlsVisible"
       [class.appearing]="bettingPanelAnimationState === 'appearing'"
       [class.disappearing]="bettingPanelAnimationState === 'disappearing'">
    <img src="assets/images/contenedores/panel-apuestas.png" alt="Panel de Apuestas" class="betting-panel-background">

    <!-- Animal name tag - posicionado absolutamente en el top center -->
    <div class="animal-name-tag" *ngIf="currentEditingAnimal">
      <img src="assets/images/contenedores/nombre-animal.png" alt="Nombre Animal" class="animal-name-container-image">
      <span class="animal-name-text">{{ currentEditingAnimal.name }}</span>
    </div>

    <!-- Animal image container - posicionado absolutamente en el top center -->
    <div class="animal-image-container" *ngIf="currentEditingAnimal">
      <img src="assets/images/contenedores/aro-dorado.png" alt="Aro Dorado" class="animal-container-frame">
      <img [src]="currentEditingAnimal.image" alt="{{ currentEditingAnimal.name }}" class="selected-animal-image pulsate-bck-normal rotate-hor-center-normal">
    </div>

    <div class="chips-section">
      <div *ngFor="let coinValue of coinValues" class="coin-chip-container"
        (click)="addCoinToCurrentAnimal(coinValue)"
        [class.disabled]="gameState === 'playing' || !currentEditingAnimal">
        <img [src]="getCoinImage(coinValue)" [alt]="'Ficha ' + coinValue" class="coin-chip-image">
        <span class="coin-chip-value">{{ coinValue }}</span>
      </div>
    </div>


    <!-- Bet amount display 
    <div class="bet-amount-display">
      <img src="assets/images/contenedores/apuesta.png" alt="Tu Apuesta" class="bet-container-image">
      <div class="bet-value">${{ (selectedAnimals | findBet:currentEditingAnimal)?.amount || 0 }}</div>
    </div> -->

    <button (click)="clearCurrentAnimalBet()" class="clear-button"
      [disabled]="!currentEditingAnimal || gameState === 'playing'">
      <img src="assets/images/botones/limpiar.png" alt="Limpiar" class="clear-button-image">
    </button>
    <div class="floating-total-bet" *ngIf="(totalBetAmount$ | async)! > 0">
      <img src="assets/images/contenedores/apuesta-total.png" alt="Apuesta Total" class="total-bet-container-image">
      <div class="total-bet-value">${{ totalBetAmount$ | async }}</div>
    </div>
  </div>

  <div class="game-area">
    <div class="wheel-side">
      <div class="wheel-container-wrapper" [class.displaced]="isWheelDisplaced">
        <app-wheel-container [animals]="animalsForWheel"
          [gameState]="gameState" [spinDuration]="spinDuration"
          [innerWheelSpinDuration]="innerWheelSpinDuration">
        </app-wheel-container>
      </div>
    </div>

    <div class="side-panel side-panel--right">
      <app-jackpot-display *ngIf="showJackpot"></app-jackpot-display>
    </div>
  </div>

  <div class="right-results-panel" [ngClass]="resultsPanelClass" aria-label="Panel de resultados futuros">
    <img src="assets/images/contenedores/scorepanel2.png" alt="Resultado" class="right-results-panel-background">
    <div class="right-results-panel-content">
      <app-results-history-panel></app-results-history-panel>
    </div>
  </div> 

  <div *ngIf="errorMessage" class="error-overlay">
    <div class="error-message">{{ errorMessage }}</div>
  </div>

  <div class="result-overlay" *ngIf="showResult && gameResult" [class.win-result]="lastWin > 0" [class.lose-result]="lastWin === 0" (click)="closeResultOverlay($event)">
    <div #resultCard class="result-container" (click)="$event.stopPropagation()">
      <!-- Logo de fondo traslúcido -->
      <div class="result-background-logo">
        <img src="assets/images/logo/logo.png" alt="Logo">
      </div>

      <button class="close-button" (click)="closeResultOverlay($event)" title="Cerrar">
        <ion-icon name="close-outline"></ion-icon>
      </button>

      <div class="result-content">
        <h3 class="result-title">{{ lastWin > 0 ? '¡HAS GANADO!' : 'SIGUE INTENTANDO' }}</h3>

        <!-- Resultado de posiciones de ruleta -->
        <div class="result-animal-description">
          <h4 class="animal-name">{{ gameResult.outerPosition }} / {{ gameResult.innerPosition }}</h4>
          <p *ngIf="lastWin > 0" class="win-amount">+${{ lastWin }}</p>
        </div>

        <!-- Botones de acción -->
        <div class="result-actions">
          <!-- Botón de compartir (solo visible cuando gana) -->
          <button *ngIf="lastWin > 0" class="result-action-button share-button" (click)="shareWin(); $event.stopPropagation()" title="Compartir victoria">
          </button>

          <!-- Botón de girar de nuevo -->
          <button class="result-action-button spin-again-button" (click)="spinAgain($event)" title="Girar de nuevo">
          </button>

          <!-- Botón de limpiar rueda -->
          <button class="result-action-button clear-wheel-button" (click)="clearWheelAndClose($event)" title="Limpiar rueda">
          </button>
        </div>
      </div>
    </div>
  </div>
  <app-game-settings *ngIf="showSettings" [isOpen]="showSettings" [uiVolume]="uiVolume"
    (closeModal)="closeSettings()" (uiVolumeChange)="onUIVolumeChange($event)"></app-game-settings>
  <app-bet-history *ngIf="showBetHistory" [isOpen]="showBetHistory" [historyData]="betHistory"
    (closeModal)="closeBetHistory()"></app-bet-history>
</ion-content>
